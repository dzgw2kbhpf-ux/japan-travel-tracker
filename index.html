<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Japan Travel Tracker Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100%; width:100%; }

#controlPanel {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  z-index:1000;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button {
  padding:8px;
  margin:5px 0;
  width:100%;
}
</style>
</head>

<body>

<div id="controlPanel">
  <button onclick="startTracking()">位置情報を開始</button>
  <div>通った距離: <span id="distance">0</span> km</div>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([35.6812,139.7671], 16);

// 🔥 リアル衛星
L.tileLayer(
 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
 { maxZoom:19 }
).addTo(map);

var polyline = L.polyline([], {color:'red'}).addTo(map);

var lastLatLng = null;
var totalDistance = 0;

function startTracking(){
  map.locate({
    watch:true,
    enableHighAccuracy:true
  });
}

map.on('locationfound', function(e){

  var latlng = e.latlng;

  if(lastLatLng){
    var dist = latlng.distanceTo(lastLatLng);
    totalDistance += dist;
    document.getElementById("distance").innerText =
      (totalDistance/1000).toFixed(2);
  }

  lastLatLng = latlng;

  polyline.addLatLng(latlng);
  map.setView(latlng);

  addNearbyShops(latlng);

});

map.on('locationerror', function(){
  alert("iPhone設定でSafariの位置情報を許可してください");
});

// 🏪 近くの店表示（簡易）
function addNearbyShops(latlng){

  fetch(`https://overpass-api.de/api/interpreter?data=
  [out:json];
  node["shop"](around:200,${latlng.lat},${latlng.lng});
  out;`)
  .then(res=>res.json())
  .then(data=>{

    data.elements.forEach(shop=>{

      var marker = L.marker([shop.lat, shop.lon]).addTo(map);

      var name = shop.tags.name || "不明な店舗";
      var type = shop.tags.shop || "";

      marker.bindPopup(`
        <b>${name}</b><br>
        種類: ${type}<br>
        <button onclick="loadWiki('${name}')">詳細を見る</button>
      `);

    });

  });

}

// 📚 Wikipedia詳細
function loadWiki(name){

 fetch(`https://ja.wikipedia.org/api/rest_v1/page/summary/${name}`)
 .then(res=>res.json())
 .then(data=>{

   alert(
     data.title + "\n\n" +
     (data.extract || "詳細なし")
   );

 });

}

</script>

</body>
</html>
