<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan Travel Tracker ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>
body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont; }
#map { position:absolute; top:0; bottom:0; width:100%; }

#ui {
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:90%;
 max-width:500px;
 background:rgba(0,0,0,0.7);
 color:white;
 border-radius:20px;
 padding:20px;
 backdrop-filter:blur(10px);
 z-index:10;
}

.button {
 width:100%;
 padding:18px;
 margin-top:10px;
 font-size:18px;
 border:none;
 border-radius:15px;
 background:#007aff;
 color:white;
}

.button.secondary {
 background:#444;
}

.status {
 margin-top:10px;
 font-size:16px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">
 <div><strong>Japan Travel Tracker</strong></div>
 <div class="status" id="info">待機中</div>
 <div class="status">距離: <span id="distance">0</span> km</div>
 <button class="button" id="startBtn">GPS開始</button>
 <button class="button secondary" id="followBtn">追尾: ON</button>
</div>

<script>

// ===== 本物ベクターマップ =====
const map = new maplibregl.Map({
 container:'map',
 style:'https://api.maptiler.com/maps/streets/style.json?key=Get_Your_Own_Key',
 center:[139.767,35.681],
 zoom:5,
 pitch:0,
 bearing:0
});

map.dragRotate.disable();
map.touchZoomRotate.disableRotation();

let marker;
let path = [];
let watchId = null;
let followMode = true;
let totalDistance = 0;

// ルートレイヤー
map.on("load",function(){

 map.addSource("route",{
   type:"geojson",
   data:{
     type:"Feature",
     geometry:{ type:"LineString", coordinates:[] }
   }
 });

 map.addLayer({
   id:"route-line",
   type:"line",
   source:"route",
   paint:{
     "line-color":"#00ffcc",
     "line-width":5
   }
 });

});

// 距離計算
function calcDistance(lat1, lon1, lat2, lon2){
 const R = 6371;
 const dLat = (lat2-lat1) * Math.PI/180;
 const dLon = (lon2-lon1) * Math.PI/180;
 const a =
   Math.sin(dLat/2)*Math.sin(dLat/2) +
   Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
   Math.sin(dLon/2)*Math.sin(dLon/2);
 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
 return R*c;
}

// GPS開始
document.getElementById("startBtn").addEventListener("click",function(){

 if(watchId) return;

 document.getElementById("info").innerText = "取得中...";

 watchId = navigator.geolocation.watchPosition(function(pos){

   const lng = pos.coords.longitude;
   const lat = pos.coords.latitude;

   document.getElementById("info").innerText = "取得成功";

   if(marker) marker.remove();

   marker = new maplibregl.Marker({color:"#ff0000"})
     .setLngLat([lng,lat])
     .addTo(map);

   if(path.length > 0){
     const prev = path[path.length-1];
     totalDistance += calcDistance(prev[1],prev[0],lat,lng);
     document.getElementById("distance").innerText = totalDistance.toFixed(2);
   }

   path.push([lng,lat]);

   map.getSource("route").setData({
     type:"Feature",
     geometry:{ type:"LineString", coordinates:path }
   });

   if(followMode){
     map.easeTo({
       center:[lng,lat],
       zoom:16,
       duration:800
     });
   }

 },function(err){
   document.getElementById("info").innerText = "失敗: "+err.message;
 },{
   enableHighAccuracy:true,
   maximumAge:0,
   timeout:10000
 });

});

// 追尾ON/OFF
document.getElementById("followBtn").addEventListener("click",function(){

 followMode = !followMode;

 this.innerText = followMode ? "追尾: ON" : "追尾: OFF";

});

</script>

</body>
</html>
