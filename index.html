<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>
body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont; }
#map { position:absolute; top:0; bottom:0; width:100%; }

/* iPhone純正風 下部カード */
#panel {
 position:absolute;
 bottom:0;
 left:0;
 right:0;
 background:white;
 border-top-left-radius:20px;
 border-top-right-radius:20px;
 padding:15px;
 box-shadow:0 -4px 15px rgba(0,0,0,0.15);
}

.row {
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

button {
 padding:10px 16px;
 font-size:15px;
 border-radius:10px;
 border:none;
 background:#007aff;
 color:white;
}

button.secondary {
 background:#e5e5ea;
 color:black;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
 <div class="row">
   <div><strong>現在の距離</strong></div>
   <div><span id="distance">0.00</span> km</div>
 </div>

 <div class="row">
   <button id="startBtn">GPS開始</button>
   <button id="followBtn" class="secondary">追尾 ON</button>
 </div>
</div>

<script>

// ===== APIキー不要のリアルタイル =====
const map = new maplibregl.Map({
 container:'map',
 style:{
   version:8,
   sources:{
     osm:{
       type:"raster",
       tiles:[
         "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
         "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
         "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
       ],
       tileSize:256
     }
   },
   layers:[
     {
       id:"osm-layer",
       type:"raster",
       source:"osm"
     }
   ]
 },
 center:[139.767,35.681],
 zoom:5,
 pitch:0,
 bearing:0
});

map.dragRotate.disable();
map.touchZoomRotate.disableRotation();

let marker;
let path = [];
let watchId = null;
let followMode = true;
let totalDistance = 0;

map.on("load",function(){

 map.addSource("route",{
   type:"geojson",
   data:{
     type:"Feature",
     geometry:{ type:"LineString", coordinates:[] }
   }
 });

 map.addLayer({
   id:"route-line",
   type:"line",
   source:"route",
   paint:{
     "line-color":"#007aff",
     "line-width":4
   }
 });

});

function calcDistance(lat1, lon1, lat2, lon2){
 const R = 6371;
 const dLat = (lat2-lat1) * Math.PI/180;
 const dLon = (lon2-lon1) * Math.PI/180;
 const a =
   Math.sin(dLat/2)*Math.sin(dLat/2) +
   Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
   Math.sin(dLon/2)*Math.sin(dLon/2);
 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
 return R*c;
}

document.getElementById("startBtn").addEventListener("click",function(){

 if(watchId) return;

 watchId = navigator.geolocation.watchPosition(function(pos){

   const lng = pos.coords.longitude;
   const lat = pos.coords.latitude;

   if(marker) marker.remove();

   marker = new maplibregl.Marker({color:"#007aff"})
     .setLngLat([lng,lat])
     .addTo(map);

   if(path.length > 0){
     const prev = path[path.length-1];
     totalDistance += calcDistance(prev[1],prev[0],lat,lng);
     document.getElementById("distance").innerText =
       totalDistance.toFixed(2);
   }

   path.push([lng,lat]);

   map.getSource("route").setData({
     type:"Feature",
     geometry:{ type:"LineString", coordinates:path }
   });

   if(followMode){
     map.easeTo({
       center:[lng,lat],
       zoom:16,
       duration:600
     });
   }

 },{
   enableHighAccuracy:true,
   maximumAge:0,
   timeout:10000
 });

});

document.getElementById("followBtn").addEventListener("click",function(){
 followMode = !followMode;
 this.innerText = followMode ? "追尾 ON" : "追尾 OFF";
});

</script>

</body>
</html>
