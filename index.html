<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan 3D Earth Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/cesium@1.114/Build/Cesium/Cesium.js"></script>
<link href="https://unpkg.com/cesium@1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width:100%; height:100%; margin:0; padding:0; overflow:hidden;
}

#ui {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(255,255,255,0.95);
 padding:12px;
 border-radius:12px;
 z-index:10;
 font-family:sans-serif;
 width:200px;
}

button {
 width:100%;
 padding:10px;
 margin-bottom:8px;
 font-size:14px;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startTracking()">位置情報開始</button>
<button onclick="toggleFollow()">追尾ON/OFF</button>
<div>距離: <span id="distance">0</span> km</div>
</div>

<div id="cesiumContainer"></div>

<script>

Cesium.Ion.defaultAccessToken = ""; // 空でOK（無料範囲）

const viewer = new Cesium.Viewer("cesiumContainer", {
 terrainProvider: Cesium.createWorldTerrain(),
 imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 }),
 shouldAnimate: true
});

// 建物3D有効化
viewer.scene.primitives.add(
  await Cesium.createOsmBuildingsAsync()
);

viewer.scene.globe.enableLighting = true;

let positions = [];
let totalDistance = 0;
let followMode = true;
let lastHeading = 0;

const arrowEntity = viewer.entities.add({
 position: Cesium.Cartesian3.fromDegrees(139.7671,35.6812,10),
 billboard: {
   image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/White_arrow.svg/1024px-White_arrow.svg.png",
   scale: 0.08,
   verticalOrigin: Cesium.VerticalOrigin.CENTER
 }
});

function startTracking(){

 navigator.geolocation.watchPosition(pos=>{

   const lat = pos.coords.latitude;
   const lon = pos.coords.longitude;
   const heading = pos.coords.heading || lastHeading;

   const cartesian = Cesium.Cartesian3.fromDegrees(lon,lat,10);

   if(positions.length>0){
     const last = positions[positions.length-1];
     const dist = Cesium.Cartesian3.distance(last,cartesian);
     totalDistance += dist;
     document.getElementById("distance").innerText =
       (totalDistance/1000).toFixed(3);
   }

   positions.push(cartesian);

   arrowEntity.position = cartesian;

   if(heading !== null){
     lastHeading = heading;
     arrowEntity.orientation = Cesium.Transforms.headingPitchRollQuaternion(
       cartesian,
       new Cesium.HeadingPitchRoll(
         Cesium.Math.toRadians(heading),
         0,
         0
       )
     );
   }

   viewer.entities.add({
     polyline:{
       positions:positions,
       width:4,
       material:Cesium.Color.WHITE
     }
   });

   if(followMode){
     viewer.camera.flyTo({
       destination: cartesian,
       orientation:{
         heading: Cesium.Math.toRadians(heading),
         pitch: Cesium.Math.toRadians(-30),
         roll:0
       },
       duration:0.2
     });
   }

 },{
   enableHighAccuracy:true,
   maximumAge:0,
   timeout:5000
 });

}

function toggleFollow(){
 followMode = !followMode;
 alert("追尾モード: " + (followMode ? "ON":"OFF"));
}

// カメラ超自由操作
viewer.scene.screenSpaceCameraController.enableRotate = true;
viewer.scene.screenSpaceCameraController.enableZoom = true;
viewer.scene.screenSpaceCameraController.enableTilt = true;
viewer.scene.screenSpaceCameraController.enableLook = true;

// 超高画質
viewer.scene.globe.maximumScreenSpaceError = 1;

</script>

</body>
</html>
