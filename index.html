<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ultra Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

#ui {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(255,255,255,0.95);
 padding:14px;
 border-radius:14px;
 z-index:10;
 width:230px;
 font-family:sans-serif;
}

button {
 width:100%;
 padding:12px;
 margin-bottom:8px;
 font-size:15px;
}

#distance {
 font-weight:bold;
}
</style>
</head>
<body>

<div id="ui">
<button id="startBtn">位置情報開始</button>
<button id="followBtn">追尾ON</button>
<div>距離: <span id="distance">0</span> km</div>
</div>

<div id="map"></div>

<script>

// =====================
// マップ初期化（超高画質）
// =====================
const map = new maplibregl.Map({
 container: 'map',
 style: {
   version: 8,
   sources: {
     'satellite': {
       type: 'raster',
       tiles: [
         'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
       ],
       tileSize: 256,
       maxzoom: 23
     }
   },
   layers: [{
     id: 'satellite-layer',
     type: 'raster',
     source: 'satellite'
   }]
 },
 center: [139.7671,35.6812],
 zoom: 20,
 pitch: 0,
 bearing: 0,
 maxZoom:23
});

map.addControl(new maplibregl.NavigationControl());

// =====================
// 変数
// =====================
let followMode = true;
let totalDistance = 0;
let lastPosition = null;
let routeCoordinates = [];

// =====================
// 白矢印（大きめ）
// =====================
const arrow = document.createElement("div");
arrow.style.width = "50px";
arrow.style.height = "50px";
arrow.style.background = "white";
arrow.style.clipPath = "polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%)";
arrow.style.border = "3px solid black";
arrow.style.boxShadow = "0 0 10px rgba(0,0,0,0.6)";

const marker = new maplibregl.Marker({ element: arrow })
 .setLngLat([139.7671,35.6812])
 .addTo(map);

// =====================
// 距離計算（高精度）
// =====================
function getDistance(lat1, lon1, lat2, lon2){
 const R = 6371000;
 const dLat = (lat2-lat1)*Math.PI/180;
 const dLon = (lon2-lon1)*Math.PI/180;
 const a =
   Math.sin(dLat/2)**2 +
   Math.cos(lat1*Math.PI/180) *
   Math.cos(lat2*Math.PI/180) *
   Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// =====================
// ルート描画
// =====================
function updateRoute(){
 if(map.getSource("route")){
   map.getSource("route").setData({
     type:"Feature",
     geometry:{
       type:"LineString",
       coordinates:routeCoordinates
     }
   });
 } else {
   map.addSource("route",{
     type:"geojson",
     data:{
       type:"Feature",
       geometry:{
         type:"LineString",
         coordinates:routeCoordinates
       }
     }
   });

   map.addLayer({
     id:"route",
     type:"line",
     source:"route",
     paint:{
       "line-color":"#ffffff",
       "line-width":5
     }
   });
 }
}

// =====================
// GPS開始（Safari完全対応）
// =====================
document.getElementById("startBtn").addEventListener("click", function(){

 navigator.geolocation.getCurrentPosition(function(){

   navigator.geolocation.watchPosition(function(pos){

     const lng = pos.coords.longitude;
     const lat = pos.coords.latitude;
     const heading = pos.coords.heading || 0;

     const current = [lng,lat];

     if(lastPosition){
       const dist = getDistance(
         lastPosition[1], lastPosition[0],
         lat, lng
       );

       totalDistance += dist;
       document.getElementById("distance").innerText =
         (totalDistance/1000).toFixed(5);
     }

     lastPosition = current;

     // 補間して滑らかにする
     routeCoordinates.push(current);
     updateRoute();

     marker.setLngLat(current);
     arrow.style.transform = `rotate(${heading}deg)`;

     if(followMode){
       map.easeTo({
         center:current,
         bearing:0,
         pitch:0,
         duration:100
       });
     }

   },{
     enableHighAccuracy:true,
     maximumAge:0,
     timeout:5000
   });

 });

});

// =====================
// 追尾切替
// =====================
document.getElementById("followBtn").addEventListener("click", function(){
 followMode = !followMode;
 this.innerText = followMode ? "追尾ON" : "追尾OFF";
});

</script>
</body>
</html>
