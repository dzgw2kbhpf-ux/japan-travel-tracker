<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stable Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; text-align:center; margin-top:100px;">

<h2>GPSテスト</h2>

<button id="startBtn" style="font-size:20px; padding:15px;">
位置情報開始
</button>

<p id="result">まだ取得していません</p>

<script>

document.getElementById("startBtn").addEventListener("click", function(){

  document.getElementById("result").innerText = "ボタン押された";

  if(!navigator.geolocation){
    document.getElementById("result").innerText = "GPS未対応";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      document.getElementById("result").innerText =
        "成功: " + pos.coords.latitude + ", " + pos.coords.longitude;
    },
    function(err){
      document.getElementById("result").innerText =
        "失敗: " + err.message;
    },
    {
      enableHighAccuracy:true,
      maximumAge:0,
      timeout:10000
    }
  );

});

</script>

</body>
</html>
