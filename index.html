<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan Free 3D Earth Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/cesium@1.114/Build/Cesium/Cesium.js"></script>
<link href="https://unpkg.com/cesium@1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width:100%; height:100%; margin:0; padding:0; overflow:hidden;
}

#ui {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(255,255,255,0.95);
 padding:12px;
 border-radius:12px;
 z-index:10;
 font-family:sans-serif;
 width:210px;
}

button {
 width:100%;
 padding:10px;
 margin-bottom:8px;
 font-size:14px;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startTracking()">位置情報開始</button>
<button onclick="toggleFollow()">追尾ON/OFF</button>
<div>距離: <span id="distance">0</span> km</div>
</div>

<div id="cesiumContainer"></div>

<script>

const viewer = new Cesium.Viewer("cesiumContainer", {
 terrainProvider: Cesium.createWorldTerrain(),
 imageryProvider: new Cesium.OpenStreetMapImageryProvider(),
 baseLayerPicker:false,
 animation:false,
 timeline:false
});

viewer.scene.globe.enableLighting = true;
viewer.scene.globe.maximumScreenSpaceError = 1; // 高画質化

// OSM建物（無料）
Cesium.createOsmBuildingsAsync().then(function(buildings){
 viewer.scene.primitives.add(buildings);
});

let positions = [];
let totalDistance = 0;
let followMode = true;
let lastHeading = 0;

// iPhone風 白矢印（自作SVG）
const arrowSVG = `
data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
<polygon points="60,0 120,120 60,90 0,120"
style="fill:white;stroke:black;stroke-width:4"/>
</svg>
`;

const arrowEntity = viewer.entities.add({
 position: Cesium.Cartesian3.fromDegrees(139.7671,35.6812,10),
 billboard: {
   image: arrowSVG,
   scale: 0.5,
   verticalOrigin: Cesium.VerticalOrigin.CENTER
 }
});

function startTracking(){

 navigator.geolocation.watchPosition(function(pos){

   const lat = pos.coords.latitude;
   const lon = pos.coords.longitude;
   const heading = pos.coords.heading ?? lastHeading;

   const cartesian = Cesium.Cartesian3.fromDegrees(lon,lat,10);

   if(positions.length>0){
     const dist = Cesium.Cartesian3.distance(
       positions[positions.length-1],
       cartesian
     );

     totalDistance += dist;

     document.getElementById("distance").innerText =
       (totalDistance/1000).toFixed(4);
   }

   positions.push(cartesian);

   arrowEntity.position = cartesian;

   if(heading !== null){
     lastHeading = heading;
     arrowEntity.orientation =
       Cesium.Transforms.headingPitchRollQuaternion(
         cartesian,
         new Cesium.HeadingPitchRoll(
           Cesium.Math.toRadians(heading),
           0,0
         )
       );
   }

   if(!viewer.entities.getById("route")){
     viewer.entities.add({
       id:"route",
       polyline:{
         positions:positions,
         width:4,
         material:Cesium.Color.WHITE
       }
     });
   } else {
     viewer.entities.getById("route").polyline.positions = positions;
   }

   if(followMode){
     viewer.camera.setView({
       destination: cartesian,
       orientation:{
         heading: Cesium.Math.toRadians(heading),
         pitch: Cesium.Math.toRadians(-35),
         roll:0
       }
     });
   }

 },{
   enableHighAccuracy:true,
   maximumAge:0,
   timeout:5000
 });

}

function toggleFollow(){
 followMode = !followMode;
 alert("追尾モード: " + (followMode ? "ON":"OFF"));
}

// 自由カメラ
viewer.scene.screenSpaceCameraController.enableRotate = true;
viewer.scene.screenSpaceCameraController.enableZoom = true;
viewer.scene.screenSpaceCameraController.enableTilt = true;
viewer.scene.screenSpaceCameraController.enableLook = true;

</script>

</body>
</html>
