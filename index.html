<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan 3D Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

#ui {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(255,255,255,0.9);
 padding:12px;
 border-radius:12px;
 z-index:10;
 font-family:sans-serif;
}

button {
 width:100%;
 padding:10px;
 margin-bottom:8px;
 font-size:16px;
}

#distance {
 font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startTracking()">位置情報を開始</button>
<div>移動距離: <span id="distance">0</span> km</div>
</div>

<div id="map"></div>

<script>

// 🔥 超高画質衛星
const map = new maplibregl.Map({
 container: 'map',
 style: {
   version: 8,
   sources: {
     'esri': {
       type: 'raster',
       tiles: [
         'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
       ],
       tileSize: 256
     }
   },
   layers: [{
     id: 'esri-layer',
     type: 'raster',
     source: 'esri'
   }]
 },
 center: [139.7671,35.6812],
 zoom: 16,
 pitch: 60,
 bearing: -17
});

map.addControl(new maplibregl.NavigationControl());

let coords = [];
let totalDistance = 0;

function startTracking(){

 if(!navigator.geolocation){
   alert("GPS未対応");
   return;
 }

 navigator.geolocation.watchPosition(pos => {

   const lng = pos.coords.longitude;
   const lat = pos.coords.latitude;

   if(coords.length > 0){
     const last = coords[coords.length-1];
     const dist = getDistance(last[1],last[0],lat,lng);
     totalDistance += dist;
     document.getElementById("distance").innerText =
       (totalDistance/1000).toFixed(2);
   }

   coords.push([lng,lat]);

   map.flyTo({
     center:[lng,lat],
     zoom:18,
     pitch:60,
     speed:0.8
   });

   drawLine();
   loadShops(lat,lng);

 }, err=>{
   alert("Safari設定で位置情報を許可してください");
 },{
   enableHighAccuracy:true
 });

}

function drawLine(){

 if(map.getSource("route")){
   map.getSource("route").setData({
     type:"Feature",
     geometry:{
       type:"LineString",
       coordinates:coords
     }
   });
 } else {
   map.addSource("route",{
     type:"geojson",
     data:{
       type:"Feature",
       geometry:{
         type:"LineString",
         coordinates:coords
       }
     }
   });

   map.addLayer({
     id:"route",
     type:"line",
     source:"route",
     paint:{
       "line-color":"#ff0000",
       "line-width":6
     }
   });
 }

}

// 📏 距離計算
function getDistance(lat1, lon1, lat2, lon2){
 const R = 6371000;
 const dLat = (lat2-lat1) * Math.PI/180;
 const dLon = (lon2-lon1) * Math.PI/180;
 const a =
   Math.sin(dLat/2)*Math.sin(dLat/2) +
   Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
   Math.sin(dLon/2)*Math.sin(dLon/2);
 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
 return R*c;
}

// 🏪 店舗表示
function loadShops(lat,lng){

 fetch(`https://overpass-api.de/api/interpreter?data=
 [out:json];
 node["shop"](around:300,${lat},${lng});
 out;`)
 .then(res=>res.json())
 .then(data=>{

   data.elements.forEach(shop=>{

     new maplibregl.Marker()
       .setLngLat([shop.lon,shop.lat])
       .setPopup(
         new maplibregl.Popup().setHTML(
           `<b>${shop.tags.name || "店舗"}</b><br>
            種類:${shop.tags.shop || ""}`
         )
       )
       .addTo(map);

   });

 });

}

</script>
</body>
</html>
